alias: "Veilleuse Glycémie"
description: >
  Change la couleur de la Philips Hue Go en fonction
  de la glycémie Dexcom en temps réel.
  La luminosité s'adapte automatiquement : douce la nuit, plus forte le jour.

mode: restart

triggers:
  # Mise à jour de la glycémie (~toutes les 5 min)
  - trigger: state
    entity_id: sensor.dexcom_g7_glucose_value
  # Lever / coucher du soleil → ajuster la luminosité immédiatement
  - trigger: state
    entity_id: sun.sun

conditions:
  - condition: not
    conditions:
      - condition: state
        entity_id: sensor.dexcom_g7_glucose_value
        state:
          - "unavailable"
          - "unknown"

actions:
  - choose:
      # ── Hypo sévère (0-55) → Bleu ──
      - conditions:
          - condition: numeric_state
            entity_id: sensor.dexcom_g7_glucose_value
            below: 56
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.lulu
            data:
              xy_color: [0.178, 0.059]
              brightness: "{{ 60 if is_state('sun.sun', 'above_horizon') else 5 }}"
              transition: 2

      # ── Hypo légère (56-70) → Violet ──
      - conditions:
          - condition: numeric_state
            entity_id: sensor.dexcom_g7_glucose_value
            above: 55
            below: 71
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.lulu
            data:
              xy_color: [0.214, 0.066]
              brightness: "{{ 60 if is_state('sun.sun', 'above_horizon') else 5 }}"
              transition: 2

      # ── Plage normale basse (71-79) → Rose ──
      - conditions:
          - condition: numeric_state
            entity_id: sensor.dexcom_g7_glucose_value
            above: 70
            below: 80
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.lulu
            data:
              xy_color: [0.426, 0.184]
              brightness: "{{ 60 if is_state('sun.sun', 'above_horizon') else 5 }}"
              transition: 2

      # ── Plage normale (80-140) → Vert ──
      - conditions:
          - condition: numeric_state
            entity_id: sensor.dexcom_g7_glucose_value
            above: 79
            below: 141
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.lulu
            data:
              xy_color: [0.401, 0.501]
              brightness: "{{ 60 if is_state('sun.sun', 'above_horizon') else 5 }}"
              transition: 2

      # ── Plage normale haute (141-179) → Vert-bleu clair ──
      - conditions:
          - condition: numeric_state
            entity_id: sensor.dexcom_g7_glucose_value
            above: 140
            below: 180
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.lulu
            data:
              xy_color: [0.360, 0.422]
              brightness: "{{ 60 if is_state('sun.sun', 'above_horizon') else 5 }}"
              transition: 2

      # ── Hyper légère (180-249) → Jaune ──
      - conditions:
          - condition: numeric_state
            entity_id: sensor.dexcom_g7_glucose_value
            above: 179
            below: 250
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.lulu
            data:
              xy_color: [0.517, 0.439]
              brightness: "{{ 60 if is_state('sun.sun', 'above_horizon') else 5 }}"
              transition: 2

      # ── Hyper (250-300) → Orange ──
      - conditions:
          - condition: numeric_state
            entity_id: sensor.dexcom_g7_glucose_value
            above: 249
            below: 301
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.lulu
            data:
              xy_color: [0.675, 0.439]
              brightness: "{{ 60 if is_state('sun.sun', 'above_horizon') else 5 }}"
              transition: 2

      # ── Hyper sévère (301-400) → Rouge ──
      - conditions:
          - condition: numeric_state
            entity_id: sensor.dexcom_g7_glucose_value
            above: 300
            below: 401
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.lulu
            data:
              xy_color: [0.675, 0.322]
              brightness: "{{ 60 if is_state('sun.sun', 'above_horizon') else 5 }}"
              transition: 2